name: nlboot validate

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "pyproject.toml"
      - "Makefile"
      - "README.md"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "pyproject.toml"
      - "Makefile"
      - "README.md"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install nlboot
        run: python -m pip install -e . pytest
      - name: Run validation
        run: make validate
      - name: Validate M2 demo fixture through CLI
        run: |
          nlboot-plan \
            --manifest examples/m2-demo/manifest.recovery.json \
            --token examples/m2-demo/enrollment-token.recovery.json \
            --trusted-keys examples/m2-demo/trusted-keys.json \
            --require-fips \
            --now 2026-04-26T14:35:00Z
