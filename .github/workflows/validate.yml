name: nlboot validate

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "rust/**"
      - "docs/**"
      - "AGENT_TASKS/**"
      - "pyproject.toml"
      - "repo.maturity.yaml"
      - "Makefile"
      - "README.md"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "rust/**"
      - "docs/**"
      - "AGENT_TASKS/**"
      - "pyproject.toml"
      - "repo.maturity.yaml"
      - "Makefile"
      - "README.md"
      - ".github/workflows/validate.yml"

jobs:
  python-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install nlboot
        run: python -m pip install -e . pytest
      - name: Run Python reference validation
        run: make validate
      - name: Validate M2 recovery fixture through Python CLI
        run: |
          nlboot-plan \
            --manifest examples/signed_boot_manifest.recovery.json \
            --token examples/enrollment_token.recovery.json \
            --trusted-keys examples/trusted_keys.recovery.json \
            --require-fips \
            --now 2026-04-26T14:35:00Z

  rust-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Check Rust client scaffold
        run: make rust-check
      - name: Run Rust M2 recovery fixture scaffold
        run: make rust-run-fixture
